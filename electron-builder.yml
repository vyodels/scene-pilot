appId: com.recruitagent.desktop
productName: Recruit Agent
electronDist: ../../.release/electron-dist
directories:
  output: dist/packages
  buildResources: .
files:
  - package.json
  - from: dist-renderer
    to: dist-renderer
  - from: dist-electron
    to: dist-electron
extraMetadata:
  main: dist-electron/electron/main.js
extraResources:
  - from: ../../.release/backend-src
    to: backend-src/src
  - from: ../../.release/backend-pyproject/pyproject.toml
    to: backend-src/pyproject.toml
  - from: ../../.release/backend-dist
    to: backend-dist
    filter:
      - "**/*"
mac:
  category: public.app-category.business
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true
  target:
    - dir
    - dmg
  artifactName: "${productName}-${version}-${arch}.${ext}"
dmg:
  sign: false
asar: true
